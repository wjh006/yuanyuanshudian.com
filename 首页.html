<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮邮书店 - 首页</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f3ef;
            color: #333;
        }

        /* 顶部导航 */
        .header {
            background: #efeced;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .logo {
            color: #8b5a2b;
            font-size: 22px;
            font-weight: 600;
            text-decoration: none;
        }
        .nav-menu {
            display: flex;
            gap: 20px;
        }
        .nav-menu a {
            color: #555;
            text-decoration: none;
        }
        .nav-menu a:hover {
            color: #8b5a2b;
        }
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .search-input {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            width: 180px;
        }
        .search-input:focus {
            outline: none;
            border-color: #8b5a2b;
        }
        .login-btn {
            color: #8b5a2b;
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid #8b5a2b;
            border-radius: 20px;
        }
        .login-btn:hover {
            background: #8b5a2b;
            color: #fff;
        }

        .banner {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
            margin: 10px 0 20px;
        }
        .banner-slides {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .banner-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s;
        }
        .banner-slide.active {
            opacity: 1;
        }
        .banner-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .banner-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 30px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .banner-prev, .banner-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.4);
            color: #fff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 3;
        }
        .banner-prev { left: 10px; }
        .banner-next { right: 10px; }
        .banner-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .banner-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            cursor: pointer;
        }
        .banner-dot.active {
            background: #fff;
        }

        .category {
            max-width: 1200px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }
        .section-title {
            text-align: center;
            color: #8b5a2b;
            margin-bottom: 30px;
            font-size: 22px;
            font-weight: 600;
        }
        .category-list {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }
        .category-item {
            width: 140px;
            height: 140px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .category-icon {
            font-size: 30px;
            color: #8b5a2b;
            margin-bottom: 10px;
        }
        .category-name {
            font-size: 14px;
            color: #555;
        }

        .book-list {
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }
        .book-card-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
        }
        .book-card {
            width: 220px;
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
        }
        .book-img {
            width: 100%;
            height: 280px;
            border-radius: 4px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .book-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .book-title {
            font-size: 15px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .book-author {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }
        .book-price {
            color: #8b5a2b;
            font-weight: 600;
            font-size: 16px;
        }

        .footer {
            background: #fff;
            padding: 40px 20px 20px;
            margin-top: 50px;
            text-align: center;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #eee;
        }
        .footer a {
            color: #8b5a2b;
            text-decoration: none;
            margin: 0 10px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.banner-slide');
        const dots = document.querySelectorAll('.banner-dot');
        const totalSlides = slides.length;
        let autoPlayInterval;

        function goToSlide(index) {
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            currentSlide = (index + totalSlides) % totalSlides;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }

        function nextSlide() { goToSlide(currentSlide + 1); }
        function prevSlide() { goToSlide(currentSlide - 1); }

        function startAutoPlay() {
            if (!autoPlayInterval) autoPlayInterval = setInterval(nextSlide, 3000);
        }
        function stopAutoPlay() {
            clearInterval(autoPlayInterval);
            autoPlayInterval = null;
        }

        document.querySelector('.banner-next').onclick = nextSlide;
        document.querySelector('.banner-prev').onclick = prevSlide;
        dots.forEach(dot => dot.onclick = () => goToSlide(parseInt(dot.dataset.index)));
        
        const bannerEl = document.querySelector('.banner');
        bannerEl.onmouseenter = stopAutoPlay;
        bannerEl.onmouseleave = startAutoPlay;

        startAutoPlay();
    </script>
