<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮邮书店</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, Helvetica, sans-serif;
            background-color: #f5f3ef;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background-color: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(178, 169, 154, 0.08);
            width: 100%;
            max-width: 300px;
        }
        .bookstore-title {
            text-align: center;
            color: #8b5a2b;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
        }
        .login-form h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 20px;
        }
        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }
        .login-form input:not([type="checkbox"]) {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 18px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            max-width: 280px;
        }
        .checkbox {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .checkbox input {
            margin-right: 8px;
            cursor: pointer;
        }
        .checkbox label {
            margin-bottom: 0;
            font-weight: normal;
            color: #666;
            cursor: pointer;
        }
        .login-form button {
            width: 100%;
            padding: 12px;
            background-color: #8b5a2b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .login-form button:hover {
            background-color: #704821;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #8b5a2b;
            text-decoration: none;
            font-size: 14px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .links br {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="bookstore-title">邮邮书店欢迎您</h1>
        <form class="login-form">
            <h2>登录</h2>
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required placeholder="请输入用户名">
            
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required placeholder="请输入密码">
            
            <div class="checkbox">
                <input type="checkbox" id="rememberme" name="rememberme">
                <label for="rememberme">记住账号密码</label>
            </div>
            
            <button type="submit">登录</button>
        </form>

        <div class="links">
            <a href="register.html" id="registerlink">注册新账号</a>
            <br>
            <a href="forgetcode.html" id="forgotpasswordlink">忘记密码？</a>
        </div>
    </div>

    <script>
        document.getElementById('registerlink').addEventListener('click',function(event){
            event.preventDefault();
            alert('跳转到注册页面');
            window.location.href = 'register.html';
        });
        document.getElementById('forgotpasswordlink').addEventListener('click',function(event){
            event.preventDefault();
            alert('跳转到找回密码页面');
            window.location.href = 'forgetcode.html';
        });
    </script>
</body>
</html>
